<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Work for Warriors AWIS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 44px 48px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo h1 {
            font-size: 1.6em;
            font-weight: 700;
            color: #2d3748;
            letter-spacing: -0.3px;
        }

        .logo .subtitle {
            font-size: 0.9em;
            color: #718096;
            margin-top: 4px;
        }

        .logo .badge {
            display: inline-block;
            margin-top: 10px;
            padding: 4px 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 20px;
            font-size: 0.78em;
            font-weight: 600;
            letter-spacing: 0.4px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.85em;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 11px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.95em;
            color: #2d3748;
            transition: border-color 0.15s;
            outline: none;
        }

        input[type="email"]:focus,
        input[type="password"]:focus {
            border-color: #667eea;
        }

        .error {
            background: #fff5f5;
            border: 1px solid #fc8181;
            color: #c53030;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.88em;
            margin-bottom: 20px;
        }

        button[type="submit"] {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.15s;
            margin-top: 4px;
        }

        button[type="submit"]:hover {
            opacity: 0.92;
        }

        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.8em;
            color: #a0aec0;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <h1>Work for Warriors</h1>
            <div class="subtitle">Automated Workforce Intelligence System</div>
            <span class="badge">VSC Portal</span>
        </div>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="form-group">
                <label for="email">WFW Email</label>
                <input type="email" id="email" name="email" placeholder="name@workforwarriors.org"
                       autocomplete="email" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password"
                       autocomplete="current-password" required>
            </div>
            <button type="submit">Sign In</button>
        </form>

        <div class="footer">Contact your administrator to reset your password.</div>
    </div>
</body>
</html>
